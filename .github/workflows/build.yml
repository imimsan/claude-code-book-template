name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile dalamud.zip
          Expand-Archive -Path dalamud.zip -DestinationPath dalamud -Force

      - name: Build
        run: dotnet build --configuration Release -p:Platform=x64
        env:
          DALAMUD_HOME: ${{ github.workspace }}\dalamud

      - name: Build pluginmaster.json
        run: |
          $manifestPath = "bin/x64/Release/HealPlan/HealPlan.json"
          $json = Get-Content $manifestPath | ConvertFrom-Json
          $baseUrl = "https://github.com/${{ github.repository }}/releases/latest/download"
          $json | Add-Member -Name "DownloadLinkInstall" -Value "$baseUrl/latest.zip" -MemberType NoteProperty -Force
          $json | Add-Member -Name "DownloadLinkUpdate" -Value "$baseUrl/latest.zip" -MemberType NoteProperty -Force
          ConvertTo-Json @($json) | Set-Content "bin/x64/Release/HealPlan/pluginmaster.json"

      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/x64/Release/HealPlan/latest.zip
            bin/x64/Release/HealPlan/pluginmaster.json
