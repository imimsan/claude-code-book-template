name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/x64/Release/SamplePlugin/latest.zip
            bin/x64/Release/SamplePlugin/SamplePlugin.json
